name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_LTS_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET_VERSION }}
            ${{ env.DOTNET_LTS_VERSION }}

      - name: Restore
        run: dotnet restore RibbonControl.sln

      - name: Build
        run: dotnet build RibbonControl.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test RibbonControl.sln -c ${{ env.CONFIGURATION }} --no-build --logger trx --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results-${{ matrix.os }}
          path: artifacts/test-results/
          retention-days: 7
          if-no-files-found: error

  pack-and-publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET_VERSION }}
            ${{ env.DOTNET_LTS_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore RibbonControl.sln

      - name: Pack RibbonControl.Core
        run: dotnet pack src/RibbonControl.Core/RibbonControl.Core.csproj -c ${{ env.CONFIGURATION }} -o artifacts/packages --no-restore /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack RibbonControl.Persistence.Json
        run: dotnet pack src/RibbonControl.Persistence.Json/RibbonControl.Persistence.Json.csproj -c ${{ env.CONFIGURATION }} -o artifacts/packages --no-restore /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.VERSION }}

      - name: List packages
        run: ls -la artifacts/packages

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: artifacts/packages/
          retention-days: 14
          if-no-files-found: error

      - name: Push NuGet packages
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbol packages
        run: dotnet nuget push "artifacts/packages/*.snupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
