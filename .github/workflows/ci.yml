name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_LTS_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET_VERSION }}
            ${{ env.DOTNET_LTS_VERSION }}

      - name: Restore
        run: dotnet restore RibbonControl.sln

      - name: Build
        run: dotnet build RibbonControl.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test RibbonControl.sln -c ${{ env.CONFIGURATION }} --no-build --logger trx --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/
          retention-days: 7
          if-no-files-found: error

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET_VERSION }}
            ${{ env.DOTNET_LTS_VERSION }}

      - name: Restore
        run: dotnet restore RibbonControl.sln

      - name: Set CI version suffix
        id: version
        run: echo "VERSION_SUFFIX=ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Pack RibbonControl.Core
        run: dotnet pack src/RibbonControl.Core/RibbonControl.Core.csproj -c ${{ env.CONFIGURATION }} -o artifacts/packages --no-restore /p:ContinuousIntegrationBuild=true /p:VersionSuffix=${{ steps.version.outputs.VERSION_SUFFIX }}

      - name: Pack RibbonControl.Persistence.Json
        run: dotnet pack src/RibbonControl.Persistence.Json/RibbonControl.Persistence.Json.csproj -c ${{ env.CONFIGURATION }} -o artifacts/packages --no-restore /p:ContinuousIntegrationBuild=true /p:VersionSuffix=${{ steps.version.outputs.VERSION_SUFFIX }}

      - name: List packages
        run: ls -la artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-ci
          path: artifacts/packages/
          retention-days: 7
          if-no-files-found: error
